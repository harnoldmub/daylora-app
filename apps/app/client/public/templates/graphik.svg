<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <!-- Full-bleed dark hero section at top -->
  <rect width="400" height="200" fill="#1A1A1A"/>
  <!-- Photo overlay gradient -->
  <rect width="400" height="200" fill="url(#ggrad)"/>
  <defs>
    <linearGradient id="ggrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0.3)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.7)"/>
    </linearGradient>
  </defs>
  <!-- Bottom section light -->
  <rect y="200" width="400" height="80" fill="#FAFAFA"/>
  <!-- Small date tag -->
  <rect x="24" y="120" width="70" height="18" rx="0" fill="rgba(255,255,255,0.1)"/>
  <text x="59" y="132" font-family="monospace" font-size="8" fill="white" text-anchor="middle" letter-spacing="1">05.07.2026</text>
  <!-- Big bold name bottom left -->
  <text x="20" y="172" font-family="Arial Black, sans-serif" font-size="28" fill="white" font-weight="900" letter-spacing="-1">ELENA &amp;</text>
  <text x="20" y="196" font-family="Arial Black, sans-serif" font-size="28" fill="white" font-weight="900" letter-spacing="-1">MARC</text>
  <!-- CTA bottom right -->
  <rect x="280" y="168" width="96" height="24" fill="white"/>
  <text x="328" y="184" font-family="sans-serif" font-size="8" fill="#0A0A0A" text-anchor="middle" font-weight="700" letter-spacing="1">RÉPONDRE</text>
  <!-- Bottom stats -->
  <text x="24" y="222" font-family="sans-serif" font-size="9" fill="#333" font-weight="700" letter-spacing="2">01 / NOTRE HISTOIRE</text>
  <line x1="24" y1="232" x2="376" y2="232" stroke="#E5E5E5" stroke-width="1"/>
  <text x="24" y="252" font-family="sans-serif" font-size="9" fill="#999" letter-spacing="1">02 / PROGRAMME</text>
  <text x="200" y="252" font-family="sans-serif" font-size="9" fill="#999" letter-spacing="1">03 / LIEUX</text>
  <!-- Premium badge -->
  <rect x="310" y="12" width="74" height="18" rx="9" fill="rgba(255,255,255,0.1)"/>
  <text x="347" y="24" font-family="sans-serif" font-size="8" fill="white" text-anchor="middle" letter-spacing="1">PREMIUM</text>
</svg>
